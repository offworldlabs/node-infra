name: Build OS Image

on:
  workflow_dispatch:
    inputs:
      version:
        description: "OS version (e.g., 0.1.0)" 
        required: true
      config:
        description: "EDI config file"
        required: true
        default: "owl-os-pi5.yml"
  push:
    branches:
      - 'develop'      
    tags:
      - 'os-v*.*.*'

jobs:
  build-os:
    name: Build EDI-PI OS image
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      
      - name: Extract version
        id: version
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "version=${{ inputs.version }}" >> $GITHUB_OUTPUT
            echo "config=${{ inputs.config }}" >> $GITHUB_OUTPUT
          else
            # Extract version from tag (os-v0.1.0 -> 0.1.0)
            VERSION="${GITHUB_REF_NAME#os-v}"  # Changed: strip os-v prefix
            echo "version=${VERSION}" >> $GITHUB_OUTPUT
            echo "config=owl-os-pi5.yml" >> $GITHUB_OUTPUT
          fi

      - name: Ensure tag is on main branch
        if: startsWith(github.ref, 'refs/tags/os-v')
        run: |
          git fetch origin main
          if ! git branch -r --contains ${{ github.sha }} | grep -q 'origin/main'; then
            echo "ERROR: Production tags (os-v*) must be created from main branch!"
            echo "Current tag is not on main. Aborting."
            exit 1
          fi
          echo "Tag verified on main branch"
      
      - name: Install EDI
        run: |
          sudo add-apt-repository ppa:m-luescher/edi-snapshots
          sudo apt-get update
          sudo apt-get install -y edi
      
      - name: Install LXD # Needed for documentation generation
        run: |
          sudo snap install core
          sudo snap install lxd
          sudo usermod -a -G lxd runner
      
      - name: Initialize LXD
        run: |
          sudo /snap/bin/lxd init --auto
          sudo /snap/bin/lxd waitready --timeout=300
          # Verify LXD is ready
          sudo /snap/bin/lxc version
      
      - name: Install mender-artifact from official repo
        run: |
          curl -fsSL https://downloads.mender.io/repos/debian/gpg | sudo tee /etc/apt/trusted.gpg.d/mender.asc
                
          echo "deb [arch=$(dpkg --print-architecture)] https://downloads.mender.io/repos/workstation-tools ubuntu/$(lsb_release -cs)/stable main" \
          | sudo tee /etc/apt/sources.list.d/mender.list
                
          sudo apt-get update
          sudo apt-get install -y mender-artifact
                
          mender-artifact --version

      - name: Install build dependencies
        run: |
          sudo apt-get install -y \
            buildah \
            containers-storage \
            crun \
            curl \
            distrobox \
            dosfstools \
            e2fsprogs \
            fakeroot \
            git \
            mmdebstrap \
            mtools \
            parted \
            podman \
            python3-sphinx \
            python3-testinfra \
            rsync \
            genimage \
            zerofree

      - name: Configure Mender tenant token
        run: |
          mkdir -p configuration/mender
          echo "mender_tenant_token: \"${{ secrets.MENDER_TENANT_TOKEN }}\"" > configuration/mender/mender_custom.yml
      
      - name: Build OS image
        run: |
          # Replace os_version in config with tag version
          VERSION="${{ steps.version.outputs.version }}"
          CONFIG="${{ steps.version.outputs.config }}"
          sed -i "s/os_version: .*/os_version: ${VERSION}/" ${CONFIG}
          
          # Run with lxd group permissions for documentation generation
          sudo -E sg lxd -c 'edi -vv project make ${{ steps.version.outputs.config }}'
      
      - name: Rename artifacts with version  
        run: |
          cd artifacts
          VERSION="${{ steps.version.outputs.version }}"
          
          # Rename main files
          [ -f "owl-os-pi5.img" ] && mv "owl-os-pi5.img" "owl-os-pi5-v${VERSION}.img"
          [ -f "owl-os-pi5.mender" ] && mv "owl-os-pi5.mender" "owl-os-pi5-v${VERSION}.mender"
          
          echo "Renamed artifacts:"
          ls -lh *.img *.mender 2>/dev/null || true
      
      - name: List artifacts
        run: |
          ls -lh artifacts/*.img artifacts/*.mender 2>/dev/null || echo "No artifacts found"
      
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: os-image-${{ steps.version.outputs.version }}
          path: |
            artifacts/*.img
            artifacts/*.mender
          retention-days: 90

      - name: Compress artifacts for release
        if: startsWith(github.ref, 'refs/tags/os-v')
        run: |
          cd artifacts
          IMG_FILE=$(ls *.img)
          cat "$IMG_FILE" | xz -9 > "${IMG_FILE}.xz"
      
      - name: Upload to GitHub Release
        if: startsWith(github.ref, 'refs/tags/os-v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/*.img.xz
            artifacts/*.mender
          fail_on_unmatched_files: true
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Get Mender artifact path
        if: startsWith(github.ref, 'refs/tags/os-v')
        id: mender_artifact
        run: |
          ARTIFACT_PATH=$(ls artifacts/*.mender)
          echo "path=$ARTIFACT_PATH" >> $GITHUB_OUTPUT
          echo "Found artifact: $ARTIFACT_PATH"

      - name: Upload to Mender
        if: startsWith(github.ref, 'refs/tags/os-v')
        uses: mendersoftware/mender-gh-action-upload-artifact@master
        with:
          mender_pat: ${{ secrets.MENDER_SERVER_ACCESS_TOKEN_OS }}
          mender_uri: https://hosted.mender.io
          mender_artifact: ${{ steps.mender_artifact.outputs.path }}