name: Build OS Image

on:
  workflow_dispatch:
    inputs:
      version:
        description: "OS version (e.g., v1.0.0)"
        required: true
      config:
        description: "EDI config file"
        required: true
        default: "pi5-radar.yml"
  push:
    tags:
      - 'os-v*.*.*'

jobs:
  build-os:
    name: Build EDI-PI OS image
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      
      - name: Extract version
        id: version
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "version=${{ inputs.version }}" >> $GITHUB_OUTPUT
            echo "config=${{ inputs.config }}" >> $GITHUB_OUTPUT
          else
            # Extract version from tag (os-v1.0.0)
            echo "version=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
            echo "config=pi5-radar.yml" >> $GITHUB_OUTPUT
          fi
      
      - name: Install EDI
        run: |
          sudo add-apt-repository ppa:m-luescher/edi-snapshots
          sudo apt-get update
          sudo apt-get install -y edi
      
      - name: Install LXD # Needed for documentation generation
        run: |
          sudo apt update
          sudo apt install snapd
          sudo snap install core
          sudo snap install lxd
          sudo usermod -a -G lxd runner
      
      - name: Initialize LXD
        run: |
          sudo /snap/bin/lxd init --auto
          sudo /snap/bin/lxd waitready --timeout=300
          # Verify LXD is ready
          sudo /snap/bin/lxc version
      
      - name: Install build dependencies
        run: |
          sudo apt-get install -y \
            buildah \
            containers-storage \
            crun \
            curl \
            distrobox \
            dosfstools \
            e2fsprogs \
            fakeroot \
            git \
            mender-artifact \
            mmdebstrap \
            mtools \
            parted \
            podman \
            python3-sphinx \
            python3-testinfra \
            rsync \
            genimage \
            zerofree

      - name: Configure Mender tenant token
        run: |
          mkdir -p configuration/mender
          echo "mender_tenant_token: \"${{ secrets.MENDER_TENANT_TOKEN_DEV }}\"" > configuration/mender/mender_custom.yml
      
      - name: Build OS image
        run: |
          # Run with lxd group permissions for documentation generation
          sudo -E sg lxd -c 'edi -vv project make ${{ steps.version.outputs.config }}'
      
      - name: List artifacts
        run: |
          ls -lh artifacts/*.img artifacts/*.mender 2>/dev/null || echo "No artifacts found"
      
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: os-image-${{ steps.version.outputs.version }}
          path: |
            artifacts/*.img
            artifacts/*.mender
          retention-days: 90

      - name: Compress artifacts for release
        if: startsWith(github.ref, 'refs/tags/os-v')
        run: |
          cd artifacts
          xz -9 -v *.img
      
      - name: Upload to GitHub Release
        if: startsWith(github.ref, 'refs/tags/os-v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/*.img.xz
            artifacts/*.mender
          fail_on_unmatched_files: true
      