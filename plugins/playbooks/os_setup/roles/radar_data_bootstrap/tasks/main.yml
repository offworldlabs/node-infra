---
# Playbook: radar_data_bootstrap
# Version: 0.1.2
# 
# Purpose: Bootstrap /data/blah2/ with application files from blah2-arm repo
# 
# This populates the persistent /data partition with:
#   - Configuration files
#   - Scripts (sdrplay-restart.sh)
#   - Test data (optional)
#
# Files are fetched from blah2-arm repo at a pinned commit/tag

# Variables to set in defaults:
# blah2_repo_url: "https://github.com/offworldlab/blah2-arm.git"
# blah2_version: "abc123def"  # commit hash or tag

# 1. Create base directory structure
- name: Create /data/blah2 directory structure
  file:
    path: "{{ item }}"
    state: directory
    mode: '0755'
    owner: root
    group: root
  loop:
    - /data/blah2
    - /data/blah2/config
    - /data/blah2/script
    - /data/blah2/save
    - /data/blah2/test

# 2. Clone blah2-arm at pinned version
- name: Clone blah2-arm repository
  git:
    repo: "{{ blah2_repo_url }}"
    dest: /tmp/blah2-arm
    version: "{{ blah2_version }}"

# 3. Copy files to /data/blah2/

- name: Copy config directory
  copy:
    src: /tmp/blah2-arm/config/
    dest: /data/blah2/config/
    owner: root
    group: root
    remote_src: yes

- name: Fix config directory permissions
  file:
    path: /data/blah2/config
    state: directory
    mode: '0755'
    owner: root
    group: root
    recurse: yes

- name: Copy sdrplay-restart.sh script
  copy:
    src: /tmp/blah2-arm/sdrplay-restart.sh
    dest: /data/blah2/script/sdrplay-restart.sh
    mode: '0755'
    owner: root
    group: root
    remote_src: yes

- name: Copy test directory #Optional could remove?
  copy:
    src: /tmp/blah2-arm/test/
    dest: /data/blah2/test/
    owner: root
    group: root
    remote_src: yes
  ignore_errors: yes

- name: Fix test directory permissions #Optional could remove?
  file:
    path: /data/blah2/test
    state: directory
    mode: '0755'
    owner: root
    group: root
    recurse: yes
  ignore_errors: yes

# Create systemd service for blah2-stack auto-start after OS updates
- name: Create blah2-stack auto-start service
  copy:
    dest: /etc/systemd/system/blah2-stack.service
    mode: '0644'
    owner: root
    group: root
    content: |
      [Unit]
      Description=Start blah2 stack containers
      After=docker.service network-online.target
      Wants=network-online.target
      Requires=docker.service
      ConditionPathExists=/data/mender-app/blah2-stack/manifests/docker-compose.yaml
      
      [Service]
      Type=oneshot
      RemainAfterExit=yes
      WorkingDirectory=/data/mender-app/blah2-stack/manifests
      ExecStart=/usr/bin/docker compose up -d --remove-orphans
      ExecStop=/usr/bin/docker compose down
      Restart=on-failure
      RestartSec=30
      StartLimitBurst=3
      StartLimitIntervalSec=300
      
      [Install]
      WantedBy=multi-user.target

- name: Enable blah2-stack service
  file:
    src: /etc/systemd/system/blah2-stack.service
    dest: /etc/systemd/system/multi-user.target.wants/blah2-stack.service
    state: link

# 4. Cleanup
- name: Remove temporary clone
  file:
    path: /tmp/blah2-arm
    state: absent