---
# Playbook: radar_data_bootstrap
# Version: 0.1.3
# 
# Purpose: Bootstrap /data/blah2/ with application files from blah2-arm repo
# 
# This populates the persistent /data partition with:
#   - Scripts (sdrplay-restart.sh)
#   - Test data (optional)
#
# Files are fetched from blah2-arm repo at a pinned commit/tag

- name: Load package versions
  include_vars: versions.yml


# 1. Create base directory structure
- name: Create /data/retina-node directory structure
  file:
    path: "{{ item }}"
    state: directory
    mode: '0755'
    owner: root
    group: root
  loop:
    - /data/retina-node
    - /data/retina-node/config
    - /data/retina-node/blah2
    - /data/retina-node/blah2/script
    - /data/retina-node/blah2/save
    - /data/retina-node/blah2/test

# 2. Create default tar1090.env for first boot
- name: Create default tar1090.env for first boot
  copy:
    dest: /data/retina-node/config/tar1090.env
    mode: '0644'
    owner: root
    group: root
    force: no  # Don't overwrite if config-merger has already populated it
    content: |
      # Default tar1090 environment - will be overwritten by config-merger
      # These are placeholder values for Docker Compose parsing on first boot
      RECEIVER_LAT=0
      RECEIVER_LON=0
      RECEIVER_ALT=0
      ADSBLOL_ENABLED=false
      ADSBLOL_RADIUS=40

# 3. Clone blah2-arm at pinned version
- name: Clone blah2-arm repository
  git:
    repo: "{{ blah2_repo_url }}"
    dest: /tmp/blah2-arm
    version: "{{ blah2_version }}"

# 4. Copy files to /data/retina-node/blah2/

- name: Copy sdrplay-restart.sh script
  copy:
    src: /tmp/blah2-arm/sdrplay-restart.sh
    dest: /data/retina-node/blah2/script/sdrplay-restart.sh
    mode: '0755'
    owner: root
    group: root
    remote_src: yes

- name: Copy test directory #Optional could remove?
  copy:
    src: /tmp/blah2-arm/test/
    dest: /data/retina-node/blah2/test/
    owner: root
    group: root
    remote_src: yes
  ignore_errors: yes

- name: Fix test directory permissions #Optional could remove?
  file:
    path: /data/retina-node/blah2/test
    state: directory
    mode: '0755'
    owner: root
    group: root
    recurse: yes
  ignore_errors: yes

# Create systemd service for retina-node auto-start after OS updates
- name: Create retina-node auto-start service
  copy:
    dest: /etc/systemd/system/retina-node.service
    mode: '0644'
    owner: root
    group: root
    content: |
      [Unit]
      Description=Start retina-node stack containers
      After=docker.service network-online.target
      Wants=network-online.target
      Requires=docker.service
      ConditionPathExists=/data/mender-app/retina-node/manifests/docker-compose.yaml

      [Service]
      Type=oneshot
      RemainAfterExit=yes
      WorkingDirectory=/data/mender-app/retina-node/manifests
      ExecStart=/usr/bin/docker compose up -d --remove-orphans
      StartLimitBurst=3
      StartLimitIntervalSec=300

      [Install]
      WantedBy=multi-user.target

- name: Enable retina-node service
  file:
    src: /etc/systemd/system/retina-node.service
    dest: /etc/systemd/system/multi-user.target.wants/retina-node.service
    state: link

# 5. Cleanup blah2
- name: Remove temporary blah2 clone
  file:
    path: /tmp/blah2-arm
    state: absent

# ======================================================================
# retina-gui Web Interface
# ======================================================================

# 6. Clone retina-gui at pinned version
- name: Clone retina-gui repository
  git:
    repo: "{{ retina_gui_repo_url }}"
    dest: /tmp/retina-gui
    version: "{{ retina_gui_version }}"

# 7. Copy entire retina-gui to /opt (app code updates with OS)
- name: Copy retina-gui to /opt
  copy:
    src: /tmp/retina-gui/
    dest: /opt/retina-gui/
    remote_src: yes

# 8. Create /data/retina-gui for persistent SSH keys
- name: Create /data/retina-gui directory
  file:
    path: /data/retina-gui
    state: directory
    mode: '0755'

# 9. Install and enable systemd service
- name: Copy retina-gui systemd service
  copy:
    src: /tmp/retina-gui/systemd/retina-gui.service
    dest: /etc/systemd/system/retina-gui.service
    mode: '0644'
    remote_src: yes

- name: Enable retina-gui service for boot
  file:
    src: /etc/systemd/system/retina-gui.service
    dest: /etc/systemd/system/multi-user.target.wants/retina-gui.service
    state: link

# 10. Configure SSH to read authorized_keys from /data/
- name: Configure sshd AuthorizedKeysFile for persistent keys
  lineinfile:
    dest: /etc/ssh/sshd_config
    regexp: '^#*\s*AuthorizedKeysFile'
    line: 'AuthorizedKeysFile /data/retina-gui/authorized_keys .ssh/authorized_keys'
    state: present

# 11. Cleanup retina-gui
- name: Remove temporary retina-gui clone
  file:
    path: /tmp/retina-gui
    state: absent