---
# Playbook: radar_packages
# Version: 0.1.1
# 
# Purpose: Pre-load system requirements for blah2 radar application
# 
# This playbook installs the essential system components needed to run blah2 on Raspberry Pi 5:
#   1. Docker CE 27.x & Docker Compose v2 - Container runtime for blah2 services
#   2. System dependencies (graphviz, libusb, libudev, expect)
#   3. SDRplay API v3.15.2 - Hardware driver for RSPDuo SDR
#   4. Mender Docker Update Module and requirements
#   5. Balena-os wifi connect captive portal
#
# Target: Raspberry Pi 5 fleet running Debian Bookworm (12.x)
#

- name: Load package versions
  include_vars: versions.yml

# 0. Update system package cache
- name: Update apt package cache
  apt:
    update_cache: yes
    cache_valid_time: 3600

# 1. Docker installation
# 1a) Install prerequisites for Docker repo
- name: Install Docker prerequisites
  apt:
    name:
      - apt-transport-https
      - ca-certificates
      - curl
      - gnupg
      - lsb-release
      - software-properties-common
    state: present

# 1b) Add Docker's GPG key
- name: Add Docker's official GPG key
  shell: |
    install -m 0755 -d /etc/apt/keyrings
    curl -fsSL https://download.docker.com/linux/debian/gpg \
      | gpg --dearmor -o /etc/apt/keyrings/docker.gpg
    chmod a+r /etc/apt/keyrings/docker.gpg
  args:
    creates: /etc/apt/keyrings/docker.gpg

# 1c) Add Docker's apt repository 
- name: Add Docker repository
  apt_repository:
    repo: "deb [arch=arm64 signed-by=/etc/apt/keyrings/docker.gpg] https://download.docker.com/linux/debian {{ ansible_lsb.codename | default('bookworm') }} stable"
    state: present
    filename: docker

# 1d) Install Docker Engine and plugins
- name: Install Docker Engine
  apt:
    name:
      - "docker-ce={{ docker_ce_version }}"
      - "docker-ce-cli={{ docker_cli_version }}"
      - "containerd.io={{ containerd_version }}"
      - "docker-buildx-plugin={{ docker_buildx_version }}"
      - "docker-compose-plugin={{ docker_compose_version }}"
    state: present
    allow_downgrade: yes
    update_cache: yes

# 1e) Enable docker service on boot
- name: Enable Docker service for boot
  file:
    src: /lib/systemd/system/docker.service
    dest: /etc/systemd/system/multi-user.target.wants/docker.service
    state: link

# 2. Install system dependencies
- name: Install required system packages
  apt:
    name:
      - graphviz        # Required by blah2 processing
      - libusb-1.0-0    # Required by SDRplay service
      - libudev1        # Required for udev device detection
      - expect          # Required for SDRplay interactive installer
    state: present

# 3. Install SDRplay API
# 3a) Create directory 
- name: Create SDRplay lib directory
  file:
    path: "/opt/blah2/lib/sdrplay-{{ sdrplay_version }}"
    state: directory
    mode: '0755'

# 3b) Download installer
- name: Download SDRplay API installer
  get_url:
    url: "{{ sdrplay_url }}"
    dest: "/opt/blah2/lib/sdrplay-{{ sdrplay_version }}/SDRplay_RSP_API-Linux-{{ sdrplay_version }}.run"
    mode: '0755'

# 3c) Extract SDRplay API
- name: Extract SDRplay API 
  shell: "./SDRplay_RSP_API-Linux-{{ sdrplay_version }}.run --tar -xvf -C ."
  args:
    chdir: "/opt/blah2/lib/sdrplay-{{ sdrplay_version }}"
    creates: "/opt/blah2/lib/sdrplay-{{ sdrplay_version }}/install_lib.sh"

# 3d) Install SDRplay API with expect
- name: Install SDRplay API library (automated)
  shell: |
    expect << 'EOF'
    set timeout 120
    log_user 1
    
    spawn ./install_lib.sh
    
    # Press RETURN to view license
    expect "Press RETURN"
    send "\r"
    
    # Wait for 'more' pager, then quit
    sleep 1
    send "q"
    
    # Accept license
    expect "y/n"
    send "y\r"
    
    # Accept defaults
    expect "y/n"
    send "y\r"
    
    expect eof
    EOF
    
    ldconfig
  args:
    chdir: "/opt/blah2/lib/sdrplay-{{ sdrplay_version }}"
    creates: /usr/local/lib/libsdrplay_api.so
  register: sdrplay_output

# 3e) Verify udev rules installation
- name: Verify SDRplay udev rules exist
  stat:
    path: /etc/udev/rules.d/66-sdrplay.rules
  register: udev_rules

- name: Confirm udev rules installation
  debug:
    msg: "SDRplay udev rules installed: {{ udev_rules.stat.exists }}"

# 3f) Configure udev trigger on boot
- name: Ensure rc.local exists with proper structure
  copy:
    dest: /etc/rc.local
    content: |
      #!/bin/bash
      exit 0
    mode: '0755'
    force: no

- name: Trigger udev on boot for hardware detection
  lineinfile:
    path: /etc/rc.local
    insertbefore: "^exit 0"
    line: "udevadm control --reload-rules && udevadm trigger"

# 4. Install Mender app update module for Docker Compose OTA updates
- name: Install tree and xdelta3 (mender update module)
  apt:
    name:
      - tree
      - xdelta3
    state: present
    update_cache: yes

- name: Create app-modules directory
  file:
    path: /usr/share/mender/app-modules/v1
    state: directory
    mode: '0755'

- name: Install Mender app update module
  get_url:
    url: "{{ mender_app_base_url }}/src/app"
    dest: /usr/share/mender/modules/v3/app
    mode: '0755'

- name: Install Docker Compose sub-module
  get_url:
    url: "{{ mender_app_base_url }}/src/app-modules/docker-compose"
    dest: /usr/share/mender/app-modules/v1/docker-compose
    mode: '0755'

- name: Install mender-app.conf
  get_url:
    url: "{{ mender_app_base_url }}/conf/mender-app.conf"
    dest: /etc/mender/mender-app.conf
    mode: '0644'

- name: Install mender-app-docker-compose.conf
  get_url:
    url: "{{ mender_app_base_url }}/conf/mender-app-docker-compose.conf"
    dest: /etc/mender/mender-app-docker-compose.conf
    mode: '0644'

# 5. Install nano for text editing
- name: Install nano editor
  apt:
    name: nano
    state: present
    update_cache: yes

# 6. Install WiFi Connect for captive portal setup
- name: Install dnsmasq for wifi-connect
  apt:
    name: dnsmasq
    state: present

- name: Stop dnsmasq service
  shell: systemctl stop dnsmasq || true

- name: Mask dnsmasq service (prevent it from starting)
  file:
    src: /dev/null
    dest: /etc/systemd/system/dnsmasq.service
    state: link
    force: yes

- name: Download and extract wifi-connect binary
  unarchive:
    src: "{{ balena_binary_url }}"
    dest: /tmp/
    remote_src: yes

- name: Install wifi-connect binary
  copy:
    src: /tmp/wifi-connect
    dest: /usr/local/sbin/wifi-connect
    mode: '0755'
    remote_src: yes

- name: Create temp directory for UI extraction
  file:
    path: /tmp/wifi-ui-temp
    state: directory

- name: Download and extract wifi-connect UI
  unarchive:
    src: "{{ balena_ui_url }}"
    dest: /tmp/wifi-ui-temp/
    remote_src: yes

- name: Create wifi-connect directory
  file:
    path: /usr/local/share/wifi-connect
    state: directory
    mode: '0755'

- name: Install wifi-connect UI files 
  shell: cp -r /tmp/wifi-ui-temp /usr/local/share/wifi-connect/ui

- name: Clean up wifi-connect temp files
  file:
    path: "{{ item }}"
    state: absent
  loop:
    - /tmp/wifi-connect
    - /tmp/wifi-ui-temp

# 7. Create wifi-connect systemd service
- name: Create wifi-connect systemd service
  copy:
    dest: /etc/systemd/system/wifi-connect.service
    mode: '0644'
    content: |
      [Unit]
      Description=WiFi Connect Captive Portal
      After=NetworkManager.service network-online.target
      Wants=NetworkManager.service network-online.target

      [Service]
      Type=simple
      # Wait 30 seconds for NetworkManager to connect to saved networks
      ExecStartPre=/bin/sleep 30
      # Only start if we don't have internet connectivity
      ExecStartPre=/bin/bash -c '! /usr/bin/nm-online -t 5 -q'
      ExecStart=/usr/local/sbin/wifi-connect --portal-ssid node-setup
      Restart=on-failure
      RestartSec=60

      [Install]
      WantedBy=multi-user.target

- name: Enable wifi-connect service for boot
  file:
    src: /etc/systemd/system/wifi-connect.service
    dest: /etc/systemd/system/multi-user.target.wants/wifi-connect.service
    state: link

# 8. Hold critical packages to prevent breaking auto-upgrades
- name: Hold Docker packages
  dpkg_selections:
    name: "{{ item }}"
    selection: hold
  loop:
    - docker-ce
    - docker-ce-cli
    - docker-compose-plugin
    - docker-buildx-plugin
    - containerd.io

